    <rect x="1486" y="640" width="160" height="110" rx="24" fill="#FFF7ED" stroke="#FDBA74" stroke-width="2"/>
    <text x="1512" y="675" class="label">AWS</text>
    <text x="1512" y="705" class="body">SES</text>
    <text x="1512" y="732" class="sub">email send</text>
  </g>

  <g class="card">
    <rect x="1040" y="790" width="260" height="110" rx="24" fill="#F0FDF4" stroke="#86EFAC" stroke-width="2"/>
    <text x="1066" y="825" class="label">AWS Realtime</text>
    <text x="1066" y="855" class="body">SST Realtime / IoT</text>
    <text x="1066" y="882" class="sub">users/{cognitoSub}/access</text>
  </g>

  <path d="M1092 525 H1040" class="edge"/>
  <path d="M1582 525 V610" class="edge"/>
  <path d="M1338 750 V790" class="edge"/>

  <g class="card">
    <rect x="72" y="760" width="260" height="120" rx="28" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2"/>
    <text x="98" y="795" class="label">Authenticated User</text>
    <text x="98" y="827" class="body">/hesabim</text>
    <text x="98" y="855" class="sub">access status + notifications</text>
  </g>

  <g class="card">
    <rect x="420" y="760" width="240" height="120" rx="28" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2"/>
    <text x="446" y="795" class="label">Protected API</text>
    <text x="446" y="827" class="body">/me/access</text>
    <text x="446" y="852" class="body">/me/notifications</text>
  </g>

  <path d="M332 820 H420" class="edge"/>
  <path d="M660 792 H1060" class="edge"/>
  <path d="M660 848 H840 V580" class="edge"/>

  <path d="M1300 845 H1460 H1460 C1460 845 1460 845 1460 845 H332" class="edgeGreen"/>
  <path d="M1566 750 V860 H332" class="edgeGreen"/>

  <text x="1338" y="830" class="small">Realtime event</text>
  <text x="1510" y="846" class="small">Email notification</text>

  <rect x="72" y="915" width="1536" height="1" fill="#CBD5E1"/>
  <text x="72" y="946" class="small">Focus file: packages/functions/src/UserAccessLifecycle/functions/persistUserAccessNotification.ts</text>
  <text x="530" y="946" class="small">Its only job is to persist a UserNotification row after the user.access.updated event is published.</text>
