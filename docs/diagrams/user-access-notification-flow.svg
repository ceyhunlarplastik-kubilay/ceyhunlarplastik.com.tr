    <text x="1118" y="505" class="label">Subscriber Lambda</text>
    <text x="1118" y="535" class="body">PersistUserAccess</text>
    <text x="1118" y="562" class="sub">Notification</text>
  </g>

  <g class="card">
    <rect x="1362" y="470" width="220" height="110" rx="24" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2"/>
    <text x="1388" y="505" class="label">Subscriber Lambda</text>
    <text x="1388" y="535" class="body">SendUserAccess</text>
    <text x="1388" y="562" class="sub">Email</text>
  </g>

  <g class="card">
    <rect x="1228" y="640" width="220" height="110" rx="24" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2"/>
    <text x="1254" y="675" class="label">Subscriber Lambda</text>
    <text x="1254" y="705" class="body">PublishUserAccess</text>
    <text x="1254" y="732" class="sub">Realtime</text>
  </g>

  <path d="M1484 280 V430 H1202 V470" class="edge"/>
  <path d="M1484 280 V430 H1472 V470" class="edge"/>
  <path d="M1484 280 V430 H1338 V640" class="edge"/>

  <g class="card">
    <rect x="840" y="470" width="200" height="110" rx="24" fill="#ECFDF5" stroke="#86EFAC" stroke-width="2"/>
    <text x="866" y="505" class="label">Database</text>
    <text x="866" y="535" class="body">UserNotification</text>
    <text x="866" y="562" class="sub">table insert</text>
  </g>

