    <text x="1086" y="159" class="body">Amazon Cognito</text>
    <text x="1086" y="186" class="sub">group add / remove</text>
  </g>

  <g class="card">
    <rect x="1060" y="240" width="240" height="110" rx="24" fill="#ECFDF5" stroke="#86EFAC" stroke-width="2"/>
    <text x="1086" y="275" class="label">Database</text>
    <text x="1086" y="305" class="body">PostgreSQL</text>
    <text x="1086" y="332" class="sub">User accessStatus + groups</text>
  </g>

  <g class="card">
    <rect x="1364" y="170" width="240" height="110" rx="24" fill="#EFF6FF" stroke="#93C5FD" stroke-width="2"/>
