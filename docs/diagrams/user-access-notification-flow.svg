<svg width="1680" height="980" viewBox="0 0 1680 980" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1680" y2="980" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#EEF2FF"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#0F172A" flood-opacity="0.08"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748B"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#10B981"/>
    </marker>
    <style>
      .title { font: 700 34px Inter, Arial, sans-serif; fill: #0F172A; }
      .subtitle { font: 400 16px Inter, Arial, sans-serif; fill: #475569; }
      .label { font: 700 13px Inter, Arial, sans-serif; fill: #0F172A; letter-spacing: 0.04em; text-transform: uppercase; }
      .body { font: 600 20px Inter, Arial, sans-serif; fill: #0F172A; }
      .sub { font: 400 15px Inter, Arial, sans-serif; fill: #475569; }
      .small { font: 500 14px Inter, Arial, sans-serif; fill: #64748B; }
      .edge { stroke: #64748B; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .edgeGreen { stroke: #10B981; stroke-width: 3; fill: none; marker-end: url(#arrow-green); stroke-dasharray: 10 10; }
      .card { filter: url(#shadow); }
    </style>
  </defs>

  <rect width="1680" height="980" fill="url(#bg)"/>

  <text x="72" y="76" class="title">User Access Notification Flow</text>
  <text x="72" y="108" class="subtitle">Admin role/access update → Cognito + PostgreSQL sync → EventBridge fan-out → in-app notification, email, realtime message</text>

  <g class="card">
    <rect x="72" y="170" width="230" height="110" rx="24" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2"/>
    <text x="98" y="205" class="label">Frontend</text>
    <text x="98" y="235" class="body">Admin UI</text>
    <text x="98" y="262" class="sub">/admin/users</text>
  </g>

  <g class="card">
    <rect x="372" y="170" width="250" height="110" rx="24" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2"/>
    <text x="398" y="205" class="label">API</text>
    <text x="398" y="235" class="body">Admin API</text>
    <text x="398" y="262" class="sub">PUT /users/{id}/role</text>
  </g>

  <g class="card">
    <rect x="696" y="150" width="290" height="150" rx="28" fill="#FFFFFF" stroke="#C7D2FE" stroke-width="2"/>
    <text x="722" y="185" class="label">Shared Domain Helper</text>
    <text x="722" y="220" class="body">updateUserAccess()</text>
    <text x="722" y="248" class="sub">permission checks</text>
    <text x="722" y="270" class="sub">group sync + DB update</text>
  </g>

