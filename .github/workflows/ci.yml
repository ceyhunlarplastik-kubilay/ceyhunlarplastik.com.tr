# CI kalite kapısı (IMPROVEMENT_PLAN.md P0.1 + P1.7)
# Yalnızca kalite kontrolü yapar; hiçbir stage'e deploy ETMEZ ve AWS erişimi gerektirmez.
#
# Kapsam (P1.7 ile genişletildi):
# - Backend typecheck bloklayıcı: tsconfig.backend.json core+functions'ı .sst'siz denetler
#   (root tsconfig CI'da kullanılamaz: infra/** global sst.* tiplerini .sst/platform'dan alır,
#   .sst gitignored; frontend'i jsx flag'siz kapsayıp sahte hata üretir).
# - Lint bloklayıcı: .open-next/** ignore edildi (on binlerce sahte hatanın kaynağıydı);
#   mevcut borç 3 kuralda warn'a indirildi (bkz. packages/frontend/eslint.config.mjs).
# - Audit: critical seviyesi bloklayıcı; high seviyesi advisory — kalan 4 high tamamen
#   sst CLI zincirinde (Lambda bundle'ına girmez), bloklayıcı olması P2.6 SST 4'e bağlı.
name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    name: Typecheck & Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - name: "Typecheck (backend: core + functions)"
        run: npm run typecheck:backend
      - name: Typecheck (frontend)
        run: npm run typecheck -w frontend
      - name: Unit tests (core)
        # vitest core'un devDependency'si; sst shell GEREKMEZ (prisma testlerde mock'lanır)
        run: npm run test:ci -w @ceyhunlarweb/core
      - name: Unit tests (functions)
        # Response validator kontratlarını gerçek functions workspace sınırında doğrular.
        run: npm run test -w @ceyhunlarweb/functions
      - name: Unit tests (frontend)
        # vitest root node_modules'a hoist edilir (core devDep); lockfile bunu deterministik kılar
        run: npm run test -w frontend

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run lint -w frontend

  audit:
    name: npm audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Audit (critical — bloklayıcı)
        run: npm audit --omit=dev --audit-level=critical
      - name: Audit (high — advisory; bloklayıcı olması P2.6 SST 4 yükseltmesine bağlı)
        continue-on-error: true
        run: npm audit --omit=dev --audit-level=high
